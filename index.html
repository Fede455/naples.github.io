<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mappa Cultura Napoli – Tutti i Punti con Ricerca</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://leaflet.github.io/Leaflet.markercluster/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://leaflet.github.io/Leaflet.markercluster/dist/MarkerCluster.Default.css" />

<style>
  body { margin:0; font-family:Arial; }
  #map { height: 100vh; width: calc(100% - 300px); float:right; }
  #sidebar {
    width:300px; height:100vh; overflow-y:auto; background:#f7f7f7;
    border-right:1px solid #ccc; padding:15px; box-sizing:border-box;
    position:fixed; left:0; top:0;
  }
  .item { padding:8px; margin:8px 0; background:#fff; border-radius:8px; cursor:pointer; }
  .filters { margin-bottom:20px; }
  .filters label { display:block; margin-bottom:5px; cursor:pointer; }
  .search-box input { width:100%; padding:6px; margin-bottom:10px; box-sizing:border-box; }
</style>
</head>

<body>

<div id="sidebar">
  <h2>Luoghi della Cultura</h2>

  <div class="search-box">
    <input type="text" id="search" placeholder="Cerca un luogo..." />
  </div>

  <div class="filters">
    <strong>Legenda / Filtri:</strong><br>
    <label><input type="checkbox" class="filtro" value="museo" checked> Musei</label>
    <label><input type="checkbox" class="filtro" value="chiesa" checked> Chiese</label>
    <label><input type="checkbox" class="filtro" value="teatro" checked> Teatri</label>
    <label><input type="checkbox" class="filtro" value="statua" checked> Statue</label>
    <label><input type="checkbox" class="filtro" value="palazzo" checked> Palazzi</label>
  </div>

  <div id="list"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://leaflet.github.io/Leaflet.markercluster/dist/leaflet.markercluster-src.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
// Mappa base
var map = L.map('map').setView([40.8518, 14.2681], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

// Cluster dei marker
var clusters = L.markerClusterGroup();
var allMarkers = [];

// Colori per tipologia
var colors = {
  museo: 'blue',
  chiesa: 'red',
  teatro: 'green',
  statua: 'orange',
  palazzo: 'purple'
};

// Caricamento GeoJSON
$.getJSON('luoghi_cultura_napoli.geojson')
  .done(function(data) {
    L.geoJson(data, {
      pointToLayer: function(feature, latlng) {
        var tipo = feature.properties.tipologia || 'museo';

        // Marker cerchio colorato
        var marker = L.circleMarker(latlng, {
          radius: 8,
          fillColor: colors[tipo] || 'gray',
          color: '#000',
          weight: 1,
          opacity: 1,
          fillOpacity: 0.8
        });

        // Corregge eventuali doppi slash e URL http->https se necessario
        var imgUrl = feature.properties.imageUrl 
                      ? feature.properties.imageUrl.replace(/\/\//g,'/').replace(/^http:/, 'https:') 
                      : null;

        // Popup con immagine e descrizione
        var popup = `
          <h3>${feature.properties.nome}</h3>
          ${imgUrl ? `<img src="${imgUrl}" style="width:100%;border-radius:8px;margin:8px 0;" />` : ''}
          <p><strong>Tipologia:</strong> ${tipo}</p>
          <p>${feature.properties.descrizione || ''}</p>
        `;
        marker.bindPopup(popup);

        allMarkers.push({ marker: marker, tipo: tipo, props: feature.properties });
        clusters.addLayer(marker);

        return marker;
      }
    });

    map.addLayer(clusters);
    aggiornaLista();
  })
  .fail(function() { console.error("Errore caricamento GeoJSON"); });

// Aggiorna sidebar lista
function aggiornaLista(filtroTesto = '') {
  var list = document.getElementById('list');
  list.innerHTML = '';
  allMarkers.forEach(obj => {
    var nome = obj.props.nome.toLowerCase();
    if (!nome.includes(filtroTesto.toLowerCase())) return;

    var div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<strong>${obj.props.nome}</strong><br>${obj.tipo}`;
    div.onclick = function() {
      map.setView(obj.marker.getLatLng(), 17);
      obj.marker.openPopup();
    };
    list.appendChild(div);
  });
}

// Ricerca live
document.getElementById('search').addEventListener('input', function() {
  aggiornaLista(this.value);
});

// Filtri checkbox
$('.filtro').change(function() {
  var tipo = $(this).val();
  var attivo = $(this).is(':checked');

  allMarkers.forEach(obj => {
    if(obj.tipo === tipo) {
      if(attivo) clusters.addLayer(obj.marker);
      else clusters.removeLayer(obj.marker);
    }
  });
});
</script>

</body>
</html>
